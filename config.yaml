backtest:
  initial_capital: 1000000
  commission: 0.0001
  slippage: 0.0001
  full_start_date: '2016-01-01'
  full_end_date: '2026-04-01'
  in_sample_end_date: '2023-01-01'
  out_sample_start_date: '2023-01-01'
  rebalance_freq: 5
  stop_loss_pct: 0.03
  max_position_pct: 0.15
  max_total_position_pct: 0.6
  min_position_pct: 0.0
  entry_threshold: 0.05
  use_cross_section: true
  use_rank_score: true
  use_trend_filter: true
  use_rolling_ic: true
  use_sub_strategies: true
  use_new_factors: true
  signal_merge_method: equal_weight
symbols:
- SHFE.RB
- DCE.M
- CZCE.MA
- CZCE.TA
- SHFE.AU
- DCE.I
- INE.SC
- SHFE.CU
- DCE.J
- CZCE.CF
- DCE.Y
- DCE.P
- DCE.L
- DCE.PP
- DCE.V
- DCE.JD
- DCE.C
- DCE.CS
- CZCE.FG
- CZCE.SR
- CZCE.OI
- CZCE.RM
- SHFE.AL
- SHFE.ZN
- SHFE.NI
- SHFE.AG
- SHFE.BU
- SHFE.RU
- SHFE.FU
- INE.LU
factor_weights:
  trend: 0.2
  term_structure: 0.2
  mean_reversion: 0.2
  vol_breakout: 0.2
  composite_resonance: 0.2
strategies:
- name: trend
  params: {}
- name: term_structure
  params: {}
- name: mean_reversion
  params: {}
- name: vol_breakout
  params: {}
- name: composite_resonance
  params: {}
- name: cross_sectional
  params:
    entry_threshold: 0.02
    top_n: 3.0
risk_management:
  stop_loss_pct: 0.03
  max_drawdown_pct: 0.2
  position_limit_pct: 0.15
  total_position_limit: 0.8
  max_positions: 10
  commission_filter_pct: 0.0
  limit_up_down_protection: true
walk_forward:
  train_bars: 252
  test_bars: 63
  step_bars: 21
  parallel: true
  max_workers: 4
bootstrap:
  n_samples: 5000
  confidence_level: 0.9
monte_carlo:
  n_simulations: 1000
  random_seed: 42
data:
  tqsdk_phone: ${TQSDK_PHONE}
  tqsdk_password: ${TQSDK_PASSWORD}
  tqsdk_data_length: 4000
  csv_data_dir: ./data
  csv_backup_enabled: true
logging:
  log_dir: ./logs
  log_level: INFO
  log_file: backtest.log
  error_file: error.log
  rotation: 10 MB
  retention: 30 days
factors:
  enabled: false
  ic_threshold: 0.03
  ir_threshold: 0.5
  max_correlation: 0.7
  target_avg_ic: 0.04
  target_max_correlation: 0.6
  capital_flow:
    enabled: false
    oi_change_window: 10
    flow_window: 20
    divergence_window: 20
  term_structure:
    enabled: false
    basis_window: 20
    roll_yield_smooth_window: 5
  cross_spread:
    # 跨品种联动因子：成对价差（pair spread）配置
    # strong_ic_pairs: 通过历史 IC 扫描得到的强信号配对列表（|IC| > 0.02）
    # 留空 [] 表示禁用跨品种联动因子，仅用单品种 24 因子体系
    # 配置示例：仅启用 "XPRB_I" + "XAU_AG" 两个配对
    strong_ic_pairs:
    - XPRB_I
    - XPRB_J
    - XCU_ZN
    - XCU_NI
    - XAU_AG
    - XFU_BU
    # spread 标准化窗口（滚动 zscore 窗口）
    spread_window: 60
    # EMA 平滑窗口
    smoothing_window: 3
    # 信号方向：revert=反转（价差偏离预测回归）/ trend=趋势（价差走阔预测延续）
    direction: revert
risk:
  stop_optimization_enabled: false
  trailing_stop:
    mode: pct
    trail_pct: 0.03
    atr_multiplier: 2.0
  time_stop:
    max_holding_days: 10
    target_return: 0.01
  composite_stop:
    fixed_stop_pct: 0.05
validation:
  enabled: false
  monte_carlo:
    n_simulations: 1000
    random_seed: 42
  sensitivity:
    perturbation: 0.2
    high_sensitivity_threshold: 0.3
output:
  output_dir: ./output_backtest_pybroker
  generate_html: true
  generate_png: true
  chart_dpi: 300
