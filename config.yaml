backtest:
  initial_capital: 1000000
  commission: 0.0002
  slippage: 0.0001
  full_start_date: '2020-01-01'
  full_end_date: '2026-05-31'
  in_sample_end_date: '2024-05-31'
  out_sample_start_date: '2024-06-01'
  rebalance_freq: 5
  stop_loss_pct: 0.025
  take_profit_pct: 0.04
  trailing_stop_pct: 0.025
  time_stop_days: 10
  use_composite_stop: true
  max_position_pct: 0.15
  max_total_position_pct: 0.6
  min_position_pct: 0.0
  entry_threshold: 0.05
  use_cross_section: true
  use_rank_score: true
  use_trend_filter: true
  use_rolling_ic: true
  use_sub_strategies: true
  use_new_factors: true
  signal_merge_method: equal_weight
  use_signal_abstraction: true
  signal_mode: hybrid
  cta_hybrid_weight: 0.9
  # ── 方向二（2026-06-15 验证通过）：横截面作为 CTA 仓位缩放因子 ──
  # sweep 结果（全期+OOS）：
  #   - linear_w1.0:  sharpe=0.039  return=16.88%  mdd=-8.47%  calmar=1.99
  #   - dynamic b=0.3 p=0.4: sharpe=0.046  return=7.49%  mdd=-2.09%  calmar=3.59
  # 方向二的核心收益：calmar +80%、mdd -75%，代价是收益减半
  hybrid_blend_method: dynamic
  xs_position_base: 0.3
  xs_position_ceiling: 1.0
  xs_opposite_penalty: 0.4
  # ── 方向三（2026-06-17 启动）：配对交易横截面信号 ──
  # 当 pair_trading_enabled=true 时，配对 z-score 替换/增强现有 XS 多因子信号
  # 默认关闭，由 scripts/exp_pair_trading.py 实验时开启
  pair_trading_enabled: false
  pair_trading_weight: 1.0
  pair_ols_window: 60
  pair_adf_window: 60
  pair_pvalue_threshold: 0.05
  pair_rebalance_interval: 20
  pair_zscore_lookback: 60
symbols:
- SHFE.AL
- SHFE.CU
- SHFE.RU
- SHFE.RB
- SHFE.HC
- DCE.M
- CZCE.FG
- DCE.PP
- CZCE.CF
factor_weights:
  trend: 0.2
  term_structure: 0.2
  mean_reversion: 0.2
  vol_breakout: 0.2
  composite_resonance: 0.2
# ── 四因子 CTA 升级（2026-06-19）──
# 启用后：仅保留动量(donchian_breakout) + 期限结构(carry) 两个核心 CTA 策略
# 配合 basis_momentum / receipt_change 组成四因子融合
four_factor:
  enabled: true
  weights:
    donchian_breakout: 0.35    # 动量
    carry: 0.30                # 期限结构
    basis_momentum: 0.35       # 基差动量
    receipt_change: 0.0        # 2026-06-19 归零（akshare 2024+ 不可用）
  basis_window: 20             # 基差动量窗口
  receipt_window: 20           # 仓单变化率窗口
  receipt_cache_dir: data/receipt_cache
  fallback_weights_3factor:    # 仓单缺失时回退权重
    donchian_breakout: 0.35
    carry: 0.30
    basis_momentum: 0.35
  fallback_weights_2factor:    # 基差+仓单均缺失
    donchian_breakout: 0.55
    carry: 0.45

# 仓单数据源配置（2026-06-19 三层架构）
receipt:
  cache_dir: data/receipt_cache
  enable_online: false           # 沙盒默认 false，生产环境 true
  request_interval_min: 1.0      # 反爬虫：最小请求间隔（秒）
  request_interval_max: 4.0      # 反爬虫：最大请求间隔（秒）
  retry_times: 3                 # 5xx/429 重试次数
  cache_ttl_days: 7              # 缓存有效期（天）
strategies:
- name: trend
  params:
    window: 10
- name: term_structure
  params:
    lookback: 40
    entry_threshold: 3.0
- name: mean_reversion
  params:
    short_window: 5
    long_window: 360
- name: vol_breakout
  params:
    ma_window: 15
    corr_window: 40
- name: composite_resonance
  params: {}
- name: cross_sectional
  params:
    entry_threshold: 0.02
    top_n: 3
    rebalance_days: 1
# ── CTA 合成策略（2026-06-19 起，仅保留动量+期限结构）──
# TSI / Pair / Momentum_MA 已验证为噪音，从合成中移除
# vol_mean_reversion 不参与四因子融合（保留代码，逻辑由"基差动量"部分覆盖）
cta_strategies:
- donchian_breakout
- carry
- basis_momentum
- receipt_change
# 完整 CTA 策略列表（仅用于单独实验，不参与四因子融合）
cta_strategies_full:
- donchian_breakout
- carry
- vol_mean_reversion
- momentum_ma
- tsi_garch
- pair_trading
- oi_signal
- basis_momentum
- receipt_change
risk_management:
  stop_loss_pct: 0.025
  max_drawdown_pct: 0.2
  position_limit_pct: 0.15
  total_position_limit: 0.8
  max_positions: 10
  commission_filter_pct: 0.0
  limit_up_down_protection: true
risk:
  stop_optimization_enabled: false
  trailing_stop:
    mode: pct
    trail_pct: 0.03
    atr_multiplier: 2.0
  time_stop:
    max_holding_days: 10
    target_return: 0.01
  composite_stop:
    fixed_stop_pct: 0.05
walk_forward:
  train_bars: 252
  test_bars: 63
  step_bars: 21
  parallel: true
  max_workers: 4
bootstrap:
  n_samples: 5000
  confidence_level: 0.9
monte_carlo:
  n_simulations: 1000
  random_seed: 42
data:
  tqsdk_phone: ${TQSDK_PHONE}
  tqsdk_password: ${TQSDK_PASSWORD}
  tqsdk_data_length: 4000
  csv_data_dir: ./data
  csv_backup_enabled: true
logging:
  log_dir: ./logs
  log_level: INFO
  log_file: backtest.log
  error_file: error.log
  rotation: 10 MB
  retention: 30 days
factors:
  enabled: false
  ic_threshold: 0.01
  ir_threshold: 0.1
  max_correlation: 0.7
  target_avg_ic: 0.02
  target_max_correlation: 0.6
  capital_flow:
    enabled: false
    oi_change_window: 10
    flow_window: 20
    divergence_window: 20
  term_structure:
    enabled: false
    basis_window: 20
    roll_yield_smooth_window: 5
  cross_spread:
    strong_ic_pairs:
    - XPRB_I
    - XPRB_J
    - XCU_ZN
    - XCU_NI
    - XAU_AG
    - XFU_BU
    spread_window: 60
    smoothing_window: 3
    direction: revert
validation:
  enabled: false
  monte_carlo:
    n_simulations: 1000
    random_seed: 42
  sensitivity:
    perturbation: 0.2
    high_sensitivity_threshold: 0.3
output:
  output_dir: ./output_backtest_pybroker
  generate_html: true
  generate_png: true
  chart_dpi: 300
