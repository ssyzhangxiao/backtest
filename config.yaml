# =============================================================================
# 量化回测系统配置文件
# =============================================================================
# 所有参数统一在此配置，代码中通过load_config()读取

# =============================================================================
# 回测参数
# =============================================================================
backtest:
  initial_cash: 1000000
  commission_rate: 0.0003
  slippage_rate: 0.0002
  full_start_date: "2016-01-01"
  full_end_date: "2026-05-01"
  # 样本内外划分：前7年训练，后3年验证
  in_sample_end_date: "2023-01-01"
  out_sample_start_date: "2023-01-01"

# =============================================================================
# 品种配置
# =============================================================================
symbols:
  - "SHFE.RB"   # 螺纹钢
  - "DCE.M"     # 豆粕
  - "CZCE.TA"   # PTA
  - "SHFE.CU"   # 铜
  - "CFFEX.IF"  # 沪深300

# =============================================================================
# 策略配置
# =============================================================================
strategies:
  - name: "dual_ma"
    params:
      short_ma: 10
      long_ma: 30
      adx_threshold: 25
      position_size: 0.2

  - name: "rsi"
    params:
      rsi_period: 20
      oversold: 25.0
      overbought: 80.0
      trending_overbought: 60.0
      trending_oversold: 40.0
      adx_threshold: 25.0
      position_size: 0.2

  - name: "vol_breakout"
    params:
      atr_period: 20
      breakout_multiplier: 2.0
      position_size: 0.2

  - name: "term_structure"
    params:
      position_size: 0.2

  - name: "spread"
    params:
      position_size: 0.2

# =============================================================================
# 市场环境检测配置
# =============================================================================
market_regime:
  volatility_window: 20
  adx_period: 14
  trend_threshold: 25
  vol_high_percentile: 0.7
  vol_low_percentile: 0.3

# =============================================================================
# 策略权重配置（用于信号融合和动态加权）
# =============================================================================
strategy_weights:
  dual_ma: 0.25
  rsi: 0.20
  vol_breakout: 0.25
  term_structure: 0.20
  spread: 0.10

# =============================================================================
# 策略切换配置
# =============================================================================
strategy_switching:
  enabled: true
  cool_down_days: 20
  regime_map:
    trend: "dual_ma"
    range: "rsi"
    high_vol: "vol_breakout"

# =============================================================================
# 风控配置
# =============================================================================
risk_management:
  stop_loss_pct: 0.05       # 单笔止损-5%
  max_drawdown_pct: 0.25    # 最大回撤-25%清盘
  position_limit_pct: 0.40  # 单品种最大仓位40%
  total_position_limit: 0.8  # 总仓位80%

# =============================================================================
# Walk-Forward配置
# =============================================================================
walk_forward:
  train_years: 2
  test_years: 1
  step_years: 1
  parallel: true
  max_workers: 4

# =============================================================================
# Bootstrap配置
# =============================================================================
bootstrap:
  n_samples: 5000
  confidence_level: 0.90

# =============================================================================
# 蒙特卡洛模拟配置
# =============================================================================
monte_carlo:
  n_simulations: 1000
  random_seed: 42

# =============================================================================
# 数据加载配置
# =============================================================================
data:
  tqsdk_data_length: 4000
  csv_data_dir: "./data"
  csv_backup_enabled: true

# =============================================================================
# 日志配置
# =============================================================================
logging:
  log_dir: "./logs"
  log_level: "INFO"
  log_file: "backtest.log"
  error_file: "error.log"
  rotation: "10 MB"
  retention: "30 days"

# =============================================================================
# 输出配置
# =============================================================================
output:
  output_dir: "./output_backtest_pybroker"
  generate_html: true
  generate_png: true
  chart_dpi: 300
